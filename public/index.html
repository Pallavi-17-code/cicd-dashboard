<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Containerized CI/CD Pipeline Dashboard</h1>

    <div class="container">

        <div class="card">
            <h2>GitHub</h2>
            <p id="github"></p>
        </div>

        <div class="card">
            <h2>CodeBuild</h2>
            <p id="codebuild"></p>
        </div>

        <div class="card">
            <h2>Docker</h2>
            <p id="docker"></p>
        </div>

        <div class="card">
            <h2>Deployment</h2>
            <p id="deployment"></p>
        </div>

        <div class="card">
            <h2>Containers</h2>
            <p id="containers"></p>
        </div>

        <div class="card">
            <h2>CPU Usage</h2>
            <p id="cpu"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
